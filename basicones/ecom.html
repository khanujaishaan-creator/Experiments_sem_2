<!DOCTYPE html>
<html>
<head>
<title>ShopingKart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f4f4;
}

header{
background:#2874f0;
color:white;
padding:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.price{
font-size:24px;
font-weight:bold;
color:green;
margin:10px 0;
}

button{
padding:10px 20px;
background:#ff9f00;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#fb641b;
color:white;
}

</style>

</head>

<body>

<header>
<h1>ShoppingKart</h1>
<p>Best Deals Everyday</p>
</header>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Wireless Headphones</h3>
<p class="price">₹1,999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Smart Watch</h3>
<p class="price">₹2,499</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Gaming Mouse</h3>
<p class="price">₹799</p>
<button>Add to Cart</button>
</div>

</section>

</body>
</html>
