<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#222;
font-family:Arial;
}
.calc{
background:#333;
padding:20px;
border-radius:15px;
}
.display{
width:240px;
height:60px;
background:white;
margin-bottom:15px;
font-size:28px;
text-align:right;
padding:10px;
box-sizing:border-box;
}
button{
width:55px;
height:55px;
margin:2px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}
button:hover{
opacity:0.8;
}
</style>
</head>
<body>

<div class="calc">
<div class="display">0</div>

<div>
<button>7</button>
<button>8</button>
<button>9</button>
<button>/</button>
</div>

<div>
<button>4</button>
<button>5</button>
<button>6</button>
<button>*</button>
</div>

<div>
<button>1</button>
<button>2</button>
<button>3</button>
<button>-</button>
</div>

<div>
<button>0</button>
<button>.</button>
<button>=</button>
<button>+</button>
</div>

</div>

</body>
</html>
